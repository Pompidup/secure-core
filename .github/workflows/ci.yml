name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

  cross-check:
    name: Cross-compile Check (Android)
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --target ${{ matrix.target }}

  ffi-harness:
    name: FFI Harness
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: chmod +x scripts/run-ffi-harness.sh && ./scripts/run-ffi-harness.sh

  ffi-header-check:
    name: FFI Header Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify C header matches Rust FFI exports
        run: chmod +x scripts/check-ffi-header.sh && ./scripts/check-ffi-header.sh

  compat-tests:
    name: Compat Tests (V1 Golden Files)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run compat tests
        run: cargo test --test compat_tests --features _test-vectors
      - name: Check golden files are deterministic
        run: |
          cargo test --test generate_compat_pack --features _test-vectors -- --ignored 2>&1
          if ! git diff --quiet testdata/compat/v1/; then
            echo "::error::FORMAT REGRESSION DETECTED — golden files differ after re-generation. Bump version or document migration."
            git diff --stat testdata/compat/v1/
            exit 1
          fi
      - name: Upload compat pack
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compat-pack-v1
          path: testdata/compat/v1/

  no-unsafe:
    name: Unsafe Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for undocumented unsafe blocks
        run: |
          # Find all unsafe blocks in Rust source files
          # Allow unsafe only if preceded by a "// SAFETY:" comment
          violations=$(grep -rn 'unsafe\s*{' --include='*.rs' . | while read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            lineno=$(echo "$line" | cut -d: -f2)
            # Check the line above for a SAFETY comment
            prev=$((lineno - 1))
            if ! sed -n "${prev}p" "$file" | grep -q '// SAFETY:'; then
              echo "$line"
            fi
          done)
          if [ -n "$violations" ]; then
            echo "::error::Found unsafe blocks without '// SAFETY:' comment on the preceding line:"
            echo "$violations"
            exit 1
          fi
          echo "No undocumented unsafe blocks found."

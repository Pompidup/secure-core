name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

  cross-check:
    name: Cross-compile Check (Android)
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --target ${{ matrix.target }}

  no-unsafe:
    name: Unsafe Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for undocumented unsafe blocks
        run: |
          # Find all unsafe blocks in Rust source files
          # Allow unsafe only if preceded by a "// SAFETY:" comment
          violations=$(grep -rn 'unsafe\s*{' --include='*.rs' . | while read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            lineno=$(echo "$line" | cut -d: -f2)
            # Check the line above for a SAFETY comment
            prev=$((lineno - 1))
            if ! sed -n "${prev}p" "$file" | grep -q '// SAFETY:'; then
              echo "$line"
            fi
          done)
          if [ -n "$violations" ]; then
            echo "::error::Found unsafe blocks without '// SAFETY:' comment on the preceding line:"
            echo "$violations"
            exit 1
          fi
          echo "No undocumented unsafe blocks found."

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

  cross-check:
    name: Cross-compile Check (Android)
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --target ${{ matrix.target }}

  ffi-harness:
    name: FFI Harness
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: chmod +x scripts/run-ffi-harness.sh && ./scripts/run-ffi-harness.sh

  ffi-header-check:
    name: FFI Header Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify C header matches Rust FFI exports
        run: chmod +x scripts/check-ffi-header.sh && ./scripts/check-ffi-header.sh

  android-jni-test:
    name: Android JNI Integration Tests
    runs-on: ubuntu-latest
    needs: cross-check
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - uses: Swatinem/rust-cache@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Build native .so for x86_64 (emulator)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: |
          mkdir -p .cargo
          printf '[target.x86_64-linux-android]\nlinker = "x86_64-linux-android35-clang"\n' >> .cargo/config.toml
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          cargo build --release --features jni --target x86_64-linux-android
          mkdir -p android/secure-core-android/src/main/jniLibs/x86_64
          cp target/x86_64-linux-android/release/libsecure_core.so \
             android/secure-core-android/src/main/jniLibs/x86_64/

      - name: Run Android instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: android
          script: ./gradlew :secure-core-android:connectedAndroidTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-jni-test-results
          path: android/secure-core-android/build/reports/androidTests/

  no-unsafe:
    name: Unsafe Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for undocumented unsafe blocks
        run: |
          # Find all unsafe blocks in Rust source files
          # Allow unsafe only if preceded by a "// SAFETY:" comment
          violations=$(grep -rn 'unsafe\s*{' --include='*.rs' . | while read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            lineno=$(echo "$line" | cut -d: -f2)
            # Check the line above for a SAFETY comment
            prev=$((lineno - 1))
            if ! sed -n "${prev}p" "$file" | grep -q '// SAFETY:'; then
              echo "$line"
            fi
          done)
          if [ -n "$violations" ]; then
            echo "::error::Found unsafe blocks without '// SAFETY:' comment on the preceding line:"
            echo "$violations"
            exit 1
          fi
          echo "No undocumented unsafe blocks found."

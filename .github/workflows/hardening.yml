name: Hardening Tests

on:
  push:
    branches: [main]

concurrency:
  group: hardening-${{ github.sha }}
  cancel-in-progress: true

jobs:
  hardening-tests:
    name: Security Hardening Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - uses: Swatinem/rust-cache@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Build native .so for x86_64 (emulator)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: |
          mkdir -p .cargo
          printf '[target.x86_64-linux-android]\nlinker = "x86_64-linux-android35-clang"\n' >> .cargo/config.toml
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          cargo build --release --features jni --target x86_64-linux-android
          mkdir -p android/secure-core-android/src/main/jniLibs/x86_64
          cp target/x86_64-linux-android/release/libsecure_core.so \
             android/secure-core-android/src/main/jniLibs/x86_64/

      - name: Run hardening tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          ram-size: 4096M
          heap-size: 512M
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: android
          script: |
            ./gradlew :secure-core-android:connectedAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.package=com.securecore.hardening

      - name: Upload hardening test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-test-results
          path: |
            android/secure-core-android/build/reports/androidTests/
            android/secure-core-android/build/outputs/androidTest-results/
          retention-days: 30
